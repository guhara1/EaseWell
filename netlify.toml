# Netlify 배포 설정 — easewell-massage.netlify.app
[build]
  command = "node build.mjs"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# 구 경로(/gyeonggi-south/*) → 루트로 301 (기존 링크 보존)
[[redirects]]
  from = "/gyeonggi-south/*"
  to = "/:splat"
  status = 301
  force = false

# 정적 에셋 캐시
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
