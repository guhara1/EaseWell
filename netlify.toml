# Netlify 배포 설정 — easewell-massage.netlify.app
[build]
  command = "node build.mjs"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# 루트 → 경기남부 메인 (301)
[[redirects]]
  from = "/"
  to = "/gyeonggi-south/"
  status = 301
  force = false

# 정적 에셋 캐시
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
